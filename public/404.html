<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>73Info</title>
  </head>
  <body>
    <script>
      (function () {
        var redirectParam = '__spa_redirect'
        var pathname = window.location.pathname || '/'
        var target = pathname + window.location.search + window.location.hash
        var isAsset = /\.[a-z0-9]{2,12}$/i.test(pathname)
        var isBackendPath = pathname.indexOf('/api/') === 0 || pathname.indexOf('/uploads/') === 0

        if (!isAsset && !isBackendPath && target.charAt(0) === '/' && target.indexOf('//') !== 0) {
          window.location.replace('/?' + redirectParam + '=' + encodeURIComponent(target))
        }
      })()
    </script>
  </body>
</html>
