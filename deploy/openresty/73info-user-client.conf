# OpenResty / Nginx SPA fallback for user-client history mode.
# Put the location rules into the active 73info.cn server block, then reload OpenResty.

# Shared zones for basic anti-CC controls.
limit_req_zone $binary_remote_addr zone=perip_req:20m rate=20r/s;
limit_conn_zone $binary_remote_addr zone=perip_conn:20m;

server {
    listen 80;
    server_name 73info.cn www.73info.cn;

    root /www/wwwroot/73info.cn;
    index index.html;
    error_page 404 /404.html;

    client_max_body_size 20m;
    client_body_timeout 15s;
    client_header_timeout 15s;
    keepalive_timeout 30s;
    send_timeout 30s;

    limit_req zone=perip_req burst=60 nodelay;
    limit_conn perip_conn 40;

    location /assets/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable" always;
    }

    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
    }

    location = /404.html {
        try_files $uri =404;
        add_header Cache-Control "no-cache" always;
    }

    location = /sitemap.xml {
        try_files $uri =404;
    }

    location = /robots.txt {
        try_files $uri =404;
    }

    # If this same virtual host also proxies backend routes, put those
    # locations above the SPA fallback.
    # location /api/ {
    #     proxy_pass http://127.0.0.1:8080;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    # location /uploads/ {
    #     proxy_pass http://127.0.0.1:8080;
    # }
    location /r/ {
        limit_req zone=perip_req burst=30 nodelay;
        limit_conn perip_conn 20;

        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Required for Vue Router history mode. Without this rule, refreshing
    # routes such as /community will hit /404.html instead of the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
